<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Detetive: O Segredo do S</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 4px solid #3b82f6;
        }

        h1 {
            color: #3b82f6;
            font-size: 26px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            background-color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .image-container {
            background-color: #334155;
            border: 3px dashed #475569;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-image {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 15px;
            background-color: white;
            padding: 10px;
        }

        .word-hint {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .btn-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 22px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-before {
            background-color: #2563eb; /* Botão Azul */
            color: white;
        }

        .btn-before:hover {
            background-color: #1d4ed8;
        }

        .btn-after {
            background-color: #eab308; /* Botão Amarelo */
            color: #0f172a; 
        }

        .btn-after:hover {
            background-color: #ca8a04;
        }

        .feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 40px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .success {
            color: #4ade80;
            background-color: #064e3b;
            border: 2px solid #059669;
        }

        .error {
            color: #f87171;
            background-color: #7f1d1d;
            border: 2px solid #b91c1c;
        }

        .emoji-anim {
            font-size: 44px;
        }

        .hidden {
            display: none !important;
        }

        .action-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🕵️‍♂️ DETETIVE LUCAS: MISSÃO S</h1>
        <div class="score-board">⭐ Pistas Desvendadas: <span id="score">0</span> / <span id="total-rounds">16</span></div>
        
        <div class="image-container" id="game-box">
            <img id="game-picture" class="game-image" src="" alt="Pista Visual">
            <div class="word-hint" id="word-display">__</div>
        </div>

        <div class="btn-container" id="action-buttons">
            <button class="btn btn-before" onclick="checkAnswer('before')">🟦 S antes da vogal</button>
            <button class="btn btn-after" onclick="checkAnswer('after')">🟨 S depois da vogal</button>
        </div>

        <div id="feedback-box" class="feedback hidden"></div>
        <button id="next-btn" class="action-btn hidden" onclick="nextQuestion()">Próxima Pista ➡️</button>
        <button id="restart-btn" class="action-btn hidden" onclick="resetGame()">Jogar Novamente 🔄</button>
    </div>

    <script>
        // Banco de dados com links de imagens diretas e seguras (servidor estável e aberto)
        const dataset = [
            // S ANTES DA VOGAL (Botão Azul)
            { word: "SAPO", display: "__APO", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/3588/3588658.png" },
            { word: "SUCO", display: "__UCO", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/2441/2441121.png" },
            { word: "SETE", display: "__ETE", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/3841/3841647.png" },
            { word: "SACOLA", display: "__ACOLA", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/2956/2956864.png" },
            { word: "SAPATO", display: "__PATO", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/5499/5499206.png" },
            { word: "SINO", display: "__NO", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/1157/1157000.png" },
            { word: "SALADA", display: "__ALADA", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/2515/2515263.png" },
            { word: "SORVETE", display: "__ORVETE", type: "before", imgUrl: "https://cdn-icons-png.flaticon.com/512/938/938063.png" },
            
            // S DEPOIS DA VOGAL (Botão Amarelo) - Corrigidas as imagens de Escova, Espelho e Escada
            { word: "ESCOVA", display: "E__COVA", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/2954/2954845.png" },
            { word: "ESCADA", display: "E__CADA", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/2983/2983803.png" },
            { word: "ESPELHO", display: "E__PELHO", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/2913/2913524.png" },
            { word: "ISQUEIRO", display: "I__QUEIRO", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/3080/3080643.png" },
            { word: "OSSO", display: "O__SO", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/2934/2934110.png" },
            { word: "OSTRA", display: "O__TRA", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/3233/3233367.png" },
            { word: "FUSCA", display: "FU__CA", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png" },
            { word: "PASTEL", display: "PA__TEL", type: "after", imgUrl: "https://cdn-icons-png.flaticon.com/512/2917/2917633.png" }
        ];

        dataset.sort(() => Math.random() - 0.5);

        let currentIndex = 0;
        let score = 0;

        const gamePicture = document.getElementById("game-picture");
        const wordDisplay = document.getElementById("word-display");
        const scoreDisplay = document.getElementById("score");
        const feedbackBox = document.getElementById("feedback-box");
        const nextBtn = document.getElementById("next-btn");
        const restartBtn = document.getElementById("restart-btn");
        const actionButtons = document.getElementById("action-buttons");
        const totalRoundsDisplay = document.getElementById("total-rounds");

        totalRoundsDisplay.innerText = dataset.length;

        function loadQuestion() {
            feedbackBox.classList.add("hidden");
            nextBtn.classList.add("hidden");
            actionButtons.classList.remove("hidden");
            
            const currentItem = dataset[currentIndex];
            gamePicture.src = currentItem.imgUrl;
            wordDisplay.innerText = currentItem.display;
        }

        // Sistema de som 100% interno à prova de bloqueios
        function playInternalSound(isSuccess) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                if (isSuccess) {
                    // Som de Sucesso (Estilo Super Mario Coin - duas notas rápidas e agudas)
                    let osc1 = ctx.createOscillator();
                    let osc2 = ctx.createOscillator();
                    let gain = ctx.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(987.77, ctx.currentTime); // Nota Si
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.08); // Nota Dó bem aguda
                    
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.08);
                    osc2.start(ctx.currentTime + 0.08);
                    osc2.stop(ctx.currentTime + 0.4);
                } else {
                    // Som de Erro (Grave e descendente)
                    let osc = ctx.createOscillator();
                    let gain = ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                    
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.log("Áudio indisponível ou bloqueado.");
            }
        }

        function checkAnswer(selectedType) {
            const currentItem = dataset[currentIndex];
            feedbackBox.classList.remove("hidden");
            actionButtons.classList.add("hidden");

            if (selectedType === currentItem.type) {
                score++;
                scoreDisplay.innerText = score;
                feedbackBox.innerHTML = `<span class="emoji-anim">🙌👏</span><span>Muito bem, você arrasou!</span>`;
                feedbackBox.className = "feedback success";
                playInternalSound(true); // Toca o som interno de acerto
            } else {
                feedbackBox.innerHTML = `<span class="emoji-anim">😢</span><span>ops, não foi dessa vez, pense mais um pouco!</span>`;
                feedbackBox.className = "feedback error";
                playInternalSound(false); // Toca o som interno de erro
            }

            if (currentIndex < dataset.length - 1) {
                nextBtn.classList.remove("hidden");
            } else {
                restartBtn.classList.remove("hidden");
                feedbackBox.innerHTML += `<br><br>🏆 <strong>Fim da Investigação!</strong> Você acertou ${score} de ${dataset.length} pistas!`;
            }
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            restartBtn.classList.add("hidden");
            dataset.sort(() => Math.random() - 0.5); 
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
