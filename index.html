<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Detetive: O Segredo do S</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 4px solid #3b82f6;
        }

        h1 {
            color: #3b82f6;
            font-size: 26px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            background-color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .image-container {
            background-color: #334155;
            border: 3px dashed #475569;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-image {
            width: 220px;
            height: 220px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .word-hint {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .btn-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 22px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-before {
            background-color: #2563eb; /* Botão Azul */
            color: white;
        }

        .btn-before:hover {
            background-color: #1d4ed8;
        }

        .btn-after {
            background-color: #eab308; /* Botão Amarelo */
            color: #0f172a; 
        }

        .btn-after:hover {
            background-color: #ca8a04;
        }

        .feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 40px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .success {
            color: #4ade80;
            background-color: #064e3b;
            border: 2px solid #059669;
        }

        .error {
            color: #f87171;
            background-color: #7f1d1d;
            border: 2px solid #b91c1c;
        }

        .emoji-anim {
            font-size: 44px;
        }

        .hidden {
            display: none !important;
        }

        .action-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🕵️‍♂️ DETETIVE LUCAS: MISSÃO S</h1>
        <div class="score-board">⭐ Pistas Desvendadas: <span id="score">0</span> / <span id="total-rounds">16</span></div>
        
        <div class="image-container" id="game-box">
            <img id="game-picture" class="game-image" src="" alt="Pista Visual">
            <div class="word-hint" id="word-display">__</div>
        </div>

        <div class="btn-container" id="action-buttons">
            <button class="btn btn-before" onclick="checkAnswer('before')">🟦 S antes da vogal</button>
            <button class="btn btn-after" onclick="checkAnswer('after')">🟨 S depois da vogal</button>
        </div>

        <div id="feedback-box" class="feedback hidden"></div>
        <button id="next-btn" class="action-btn hidden" onclick="nextQuestion()">Próxima Pista ➡️</button>
        <button id="restart-btn" class="action-btn hidden" onclick="resetGame()">Jogar Novamente 🔄</button>
    </div>

    <script>
        // Banco de dados com os links diretos das imagens do Pinterest fornecidas por você
        const dataset = [
            // S ANTES DA VOGAL (Botão Azul)
            { word: "SAPO", display: "__APO", type: "before", imgUrl: "https://i.pinimg.com/736x/01/9b/ef/019bef596ef8b3353b3bf7b50db61b84.jpg" },
            { word: "SUCO", display: "__UCO", type: "before", imgUrl: "https://i.pinimg.com/736x/9b/9a/c0/9b9ac07f3547b7440498a9645f65342a.jpg" },
            { word: "SETE", display: "__ETE", type: "before", imgUrl: "https://i.pinimg.com/736x/87/42/fa/8742fa41775f0a0d4db0264b38d38827.jpg" },
            { word: "SACOLA", display: "__ACOLA", type: "before", imgUrl: "https://i.pinimg.com/736x/5b/c2/f0/5bc2f00a4d46bd7aee809bc489f07a7b.jpg" },
            { word: "SAPATO", display: "__PATO", type: "before", imgUrl: "https://i.pinimg.com/736x/04/b8/b6/04b8b60991b19a1fb30c1ce8547ca543.jpg" },
            { word: "SINO", display: "__NO", type: "before", imgUrl: "https://i.pinimg.com/736x/67/60/a4/6760a4f6cf7bc8e2029ec2e99d214646.jpg" },
            { word: "SALADA", display: "__ALADA", type: "before", imgUrl: "https://i.pinimg.com/736x/bd/6d/81/bd6d8175d9e5be0267756f7efcc24949.jpg" },
            { word: "SORVETE", display: "__ORVETE", type: "before", imgUrl: "https://i.pinimg.com/736x/05/cf/14/05cf1445b23d06eb18fefb6d19456bb0.jpg" },
            
            // S DEPOIS DA VOGAL (Botão Amarelo)
            { word: "ESCOVA", display: "E__COVA", type: "after", imgUrl: "https://i.pinimg.com/736x/72/48/04/7248049396491164ed2e7fef48ba767d.jpg" },
            { word: "ESCADA", display: "E__CADA", type: "after", imgUrl: "https://i.pinimg.com/736x/11/04/79/110479615799829176fb977fb797fa91.jpg" },
            { word: "ESPELHO", display: "E__PELHO", type: "after", imgUrl: "https://i.pinimg.com/736x/86/87/02/868702215622317001407fcf8ee550f2.jpg" },
            { word: "ISQUEIRO", display: "I__QUEIRO", type: "after", imgUrl: "https://i.pinimg.com/736x/89/3f/17/893f173873df1f0449bc9842a5cf387e.jpg" },
            { word: "OSSO", display: "O__SO", type: "after", imgUrl: "https://i.pinimg.com/736x/41/ef/5a/41ef5acc03d092040b2fcf3e634ea8be.jpg" },
            { word: "OSTRA", display: "O__TRA", type: "after", imgUrl: "https://i.pinimg.com/736x/00/01/f9/0001f9dca1f54cfdf7b6ec6329043749.jpg" },
            { word: "FUSCA", display: "FU__CA", type: "after", imgUrl: "https://i.pinimg.com/736x/2f/cb/e5/2fcbe56fca554033c467e42dca7e30d1.jpg" },
            { word: "PASTEL", display: "PA__TEL", type: "after", imgUrl: "https://i.pinimg.com/736x/14/48/89/144889313007156234f9a0662fe1e905.jpg" }
        ];

        // Sorteio aleatório para cada partida ser única
        dataset.sort(() => Math.random() - 0.5);

        let currentIndex = 0;
        let score = 0;

        const gamePicture = document.getElementById("game-picture");
        const wordDisplay = document.getElementById("word-display");
        const scoreDisplay = document.getElementById("score");
        const feedbackBox = document.getElementById("feedback-box");
        const nextBtn = document.getElementById("next-btn");
        const restartBtn = document.getElementById("restart-btn");
        const actionButtons = document.getElementById("action-buttons");
        const totalRoundsDisplay = document.getElementById("total-rounds");

        totalRoundsDisplay.innerText = dataset.length;

        function loadQuestion() {
            feedbackBox.classList.add("hidden");
            nextBtn.classList.add("hidden");
            actionButtons.classList.remove("hidden");
            
            const currentItem = dataset[currentIndex];
            gamePicture.src = currentItem.imgUrl;
            wordDisplay.innerText = currentItem.display;
        }

        function checkAnswer(selectedType) {
            const currentItem = dataset[currentIndex];
            feedbackBox.classList.remove("hidden");
            actionButtons.classList.add("hidden");

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (selectedType === currentItem.type) {
                score++;
                scoreDisplay.innerText = score;
                feedbackBox.innerHTML = `<span class="emoji-anim">👏</span><span>Muito bem, você arrasou!</span>`;
                feedbackBox.className = "feedback success";
                
                // Som de acerto alegre
                playTone(audioCtx, 523.25, "sine", 0.1); 
                setTimeout(() => playTone(audioCtx, 659.25, "sine", 0.1), 100); 
                setTimeout(() => playTone(audioCtx, 783.99, "sine", 0.3), 200); 
            } else {
                feedbackBox.innerHTML = `<span class="emoji-anim">😢</span><span>ops, não foi dessa vez, pense mais um pouco!</span>`;
                feedbackBox.className = "feedback error";
                
                // Som de erro triste
                playTone(audioCtx, 293.66, "triangle", 0.2); 
                setTimeout(() => playTone(audioCtx, 220.00, "triangle", 0.4), 200); 
            }

            if (currentIndex < dataset.length - 1) {
                nextBtn.classList.remove("hidden");
            } else {
                restartBtn.classList.remove("hidden");
                feedbackBox.innerHTML += `<br><br>🏆 <strong>Fim da Investigação!</strong> Você acertou ${score} de ${dataset.length} pistas!`;
            }
        }

        function playTone(ctx, freq, type, duration) {
            try {
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            restartBtn.classList.add("hidden");
            dataset.sort(() => Math.random() - 0.5); 
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
