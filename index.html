<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Detetive: O Segredo do S</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 4px solid #3b82f6;
        }

        h1 {
            color: #3b82f6;
            font-size: 26px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            background-color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .image-container {
            background-color: #334155;
            border: 3px dashed #475569;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .emoji-display {
            font-size: 100px;
            margin-bottom: 15px;
            user-select: none;
        }

        .word-hint {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .btn-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 22px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-before {
            background-color: #2563eb; /* Botão Azul */
            color: white;
        }

        .btn-before:hover {
            background-color: #1d4ed8;
        }

        .btn-after {
            background-color: #eab308; /* Botão Amarelo */
            color: #0f172a; 
        }

        .btn-after:hover {
            background-color: #ca8a04;
        }

        .feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 40px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .success {
            color: #4ade80;
            background-color: #064e3b;
            border: 2px solid #059669;
        }

        .error {
            color: #f87171;
            background-color: #7f1d1d;
            border: 2px solid #b91c1c;
        }

        .emoji-anim {
            font-size: 44px;
        }

        .hidden {
            display: none !important;
        }

        .action-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🕵️‍♂️ DETETIVE LUCAS: MISSÃO S</h1>
        <div class="score-board">⭐ Pistas Desvendadas: <span id="score">0</span> / <span id="total-rounds">16</span></div>
        
        <div class="image-container" id="game-box">
            <div id="emoji-graphic" class="emoji-display">🐸</div>
            <div class="word-hint" id="word-display">__</div>
        </div>

        <div class="btn-container" id="action-buttons">
            <button class="btn btn-before" onclick="checkAnswer('before')">🟦 S antes da vogal</button>
            <button class="btn btn-after" onclick="checkAnswer('after')">🟨 S depois da vogal</button>
        </div>

        <div id="feedback-box" class="feedback hidden"></div>
        <button id="next-btn" class="action-btn hidden" onclick="nextQuestion()">Próxima Pista ➡️</button>
        <button id="restart-btn" class="action-btn hidden" onclick="resetGame()">Jogar Novamente 🔄</button>
    </div>

    <script>
        // Banco de dados autônomo com emojis universais e estáveis
        const dataset = [
            // S ANTES DA VOGAL (Botão Azul)
            { word: "SAPO", display: "__APO", type: "before", emoji: "🐸" },
            { word: "SUCO", display: "__UCO", type: "before", emoji: "🧃" },
            { word: "SETE", display: "__ETE", type: "before", emoji: "7️⃣" },
            { word: "SACOLA", display: "__ACOLA", type: "before", emoji: "🛍️" },
            { word: "SAPATO", display: "__PATO", type: "before", emoji: "Sneakers" },
            { word: "SINO", display: "__NO", type: "before", emoji: "🔔" },
            { word: "SALADA", display: "__ALADA", type: "before", emoji: "🥗" },
            { word: "SORVETE", display: "__ORVETE", type: "before", emoji: "🍦" },
            
            // S DEPOIS DA VOGAL (Botão Amarelo) - Emojis atualizados para máxima compatibilidade
            { word: "ESCOVA", display: "E__COVA", type: "after", emoji: "🪥" },
            { word: "ESCADA", display: "E__CADA", type: "after", emoji: "🪜" },
            { word: "ESPELHO", display: "E__PELHO", type: "after", emoji: "🪞" },
            { word: "ISQUEIRO", display: "I__QUEIRO", type: "after", emoji: "🔥" },
            { word: "OSSO", display: "O__SO", type: "after", emoji: "🦴" },
            { word: "OSTRA", display: "O__TRA", type: "after", emoji: "🦪" },
            { word: "FUSCA", display: "FU__CA", type: "after", emoji: "🚗" },
            { word: "PASTEL", display: "PA__TEL", type: "after", emoji: " dumpling " }
        ];

        // Correção de compatibilidade fina para garantir visualização em qualquer aparelho antigo
        dataset.forEach(item => {
            if(item.emoji === "Sneakers") item.emoji = "👟";
            if(item.emoji === " dumpling ") item.emoji = "🥟";
        });

        dataset.sort(() => Math.random() - 0.5);

        let currentIndex = 0;
        let score = 0;

        const emojiGraphic = document.getElementById("emoji-graphic");
        const wordDisplay = document.getElementById("word-display");
        const scoreDisplay = document.getElementById("score");
        const feedbackBox = document.getElementById("feedback-box");
        const nextBtn = document.getElementById("next-btn");
        const restartBtn = document.getElementById("restart-btn");
        const actionButtons = document.getElementById("action-buttons");
        const totalRoundsDisplay = document.getElementById("total-rounds");

        totalRoundsDisplay.innerText = dataset.length;

        function loadQuestion() {
            feedbackBox.classList.add("hidden");
            nextBtn.classList.add("hidden");
            actionButtons.classList.remove("hidden");
            
            const currentItem = dataset[currentIndex];
            emojiGraphic.innerText = currentItem.emoji;
            wordDisplay.innerText = currentItem.display;
        }

        // Sintetizador interno para gerar som de comemoração e erro direto no aparelho
        function playInternalSound(isSuccess) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                if (isSuccess) {
                    // Som de Sucesso (Duas notas rápidas e agudas ascendentes)
                    let osc1 = ctx.createOscillator();
                    let osc2 = ctx.createOscillator();
                    let gain = ctx.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(587.33, ctx.currentTime); // Ré
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, ctx.currentTime + 0.08); // Lá agudo
                    
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.35);
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc1.start(ctx.currentTime);
                    osc1.stop(ctx.currentTime + 0.08);
                    osc2.start(ctx.currentTime + 0.08);
                    osc2.stop(ctx.currentTime + 0.35);
                } else {
                    // Som de ops/erro (Grave e descendente sutil)
                    let osc = ctx.createOscillator();
                    let gain = ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(130, ctx.currentTime + 0.25);
                    
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.25);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + 0.25);
                }
            } catch (e) {}
        }

        function checkAnswer(selectedType) {
            const currentItem = dataset[currentIndex];
            feedbackBox.classList.remove("hidden");
            actionButtons.classList.add("hidden");

            if (selectedType === currentItem.type) {
                score++;
                scoreDisplay.innerText = score;
                feedbackBox.innerHTML = `<span class="emoji-anim">🙌👏</span><span>Muito bem, você arrasou!</span>`;
                feedbackBox.className = "feedback success";
                playInternalSound(true);
            } else {
                feedbackBox.innerHTML = `<span class="emoji-anim">😢</span><span>ops, não foi dessa vez, pense mais um pouco!</span>`;
                feedbackBox.className = "feedback error";
                playInternalSound(false);
            }

            if (currentIndex < dataset.length - 1) {
                nextBtn.classList.remove("hidden");
            } else {
                restartBtn.classList.remove("hidden");
                feedbackBox.innerHTML += `<br><br>🏆 <strong>Fim da Investigação!</strong> Você acertou ${score} de ${dataset.length} pistas!`;
            }
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            restartBtn.classList.add("hidden");
            dataset.sort(() => Math.random() - 0.5); 
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
