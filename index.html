<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Detetive: O Segredo do S</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 4px solid #3b82f6;
        }

        h1 {
            color: #3b82f6;
            font-size: 26px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            background-color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .image-container {
            background-color: #334155;
            border: 3px dashed #475569;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-image {
            width: 200px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .word-hint {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .btn-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 20px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-before {
            background-color: #2563eb; /* Azul */
            color: white;
        }

        .btn-before:hover {
            background-color: #1d4ed8;
        }

        .btn-after {
            background-color: #eab308; /* Amarelo */
            color: #0f172a; 
        }

        .btn-after:hover {
            background-color: #ca8a04;
        }

        .feedback {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            min-height: 40px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .success {
            color: #4ade80;
            background-color: #064e3b;
            border: 2px solid #059669;
        }

        .error {
            color: #f87171;
            background-color: #7f1d1d;
            border: 2px solid #b91c1c;
        }

        .emoji-anim {
            font-size: 40px;
        }

        .hidden {
            display: none !important;
        }

        .action-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🕵️‍♂️ DETETIVE LUCAS: MISSÃO S</h1>
        <div class="score-board">⭐ Pistas Desvendadas: <span id="score">0</span> / <span id="total-rounds">16</span></div>
        
        <div class="image-container" id="game-box">
            <img id="game-picture" class="game-image" src="" alt="Pista Visual">
            <div class="word-hint" id="word-display">__</div>
        </div>

        <div class="btn-container" id="action-buttons">
            <button class="btn btn-before" onclick="checkAnswer('before')">🟦 S antes da vogal</button>
            <button class="btn btn-after" onclick="checkAnswer('after')">🟨 S depois da vogal</button>
        </div>

        <div id="feedback-box" class="feedback hidden"></div>
        <button id="next-btn" class="action-btn hidden" onclick="nextQuestion()">Próxima Pista ➡️</button>
        <button id="restart-btn" class="action-btn hidden" onclick="resetGame()">Jogar Novamente 🔄</button>
    </div>

    <script>
        // Banco de dados atualizado com fotos reais e ilustrações nítidas abertas (Unsplash)
        const dataset = [
            // S ANTES DA VOGAL
            { word: "SAPO", display: "__APO", type: "before", imgUrl: "https://images.unsplash.com/photo-1579380656108-f98e4df4ea62?w=400&auto=format&fit=crop&q=60" },
            { word: "SUCO", display: "__UCO", type: "before", imgUrl: "https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=400&auto=format&fit=crop&q=60" },
            { word: "SETE", display: "__ETE", type: "before", imgUrl: "https://images.unsplash.com/photo-1595841696677-5489e3540c1f?w=400&auto=format&fit=crop&q=60" },
            { word: "SACOLA", display: "__ACOLA", type: "before", imgUrl: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&auto=format&fit=crop&q=60" },
            { word: "SAPATO", display: "__PATO", type: "before", imgUrl: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&auto=format&fit=crop&q=60" },
            { word: "SINO", display: "__NO", type: "before", imgUrl: "https://images.unsplash.com/photo-1606913160714-d0794354363f?w=400&auto=format&fit=crop&q=60" },
            { word: "SALADA", display: "__ALADA", type: "before", imgUrl: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&auto=format&fit=crop&q=60" },
            { word: "SORVETE", display: "__ORVETE", type: "before", imgUrl: "https://images.unsplash.com/photo-1501443712940-3de7704645f0?w=400&auto=format&fit=crop&q=60" },
            
            // S DEPOIS DA VOGAL
            { word: "ASFALTO", display: "A__FALTO", type: "after", imgUrl: "https://images.unsplash.com/photo-1533240332313-0db49b459ad6?w=400&auto=format&fit=crop&q=60" },
            { word: "ESCADA", display: "E__CADA", type: "after", imgUrl: "https://images.unsplash.com/photo-1601598851547-4302969d0614?w=400&auto=format&fit=crop&q=60" },
            { word: "ESPELHO", display: "E__PELHO", type: "after", imgUrl: "https://images.unsplash.com/photo-1618220179428-22790b461013?w=400&auto=format&fit=crop&q=60" },
            { word: "ISQUEIRO", display: "I__QUEIRO", type: "after", imgUrl: "https://images.unsplash.com/photo-1556938212-0050e057df24?w=400&auto=format&fit=crop&q=60" },
            { word: "OSSO", display: "O__SO", type: "after", imgUrl: "https://images.unsplash.com/photo-1582719188393-bb71ca45dbb9?w=400&auto=format&fit=crop&q=60" },
            { word: "OSTRA", display: "O__TRA", type: "after", imgUrl: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400&auto=format&fit=crop&q=60" },
            { word: "FUSCA", display: "FU__CA", type: "after", imgUrl: "https://images.unsplash.com/photo-1526402919747-d51624b51829?w=400&auto=format&fit=crop&q=60" },
            { word: "PASTEL", display: "PA__TEL", type: "after", imgUrl: "https://images.unsplash.com/photo-1608039755401-742074f0548d?w=400&auto=format&fit=crop&q=60" }
        ];

        dataset.sort(() => Math.random() - 0.5);

        let currentIndex = 0;
        let score = 0;

        const gamePicture = document.getElementById("game-picture");
        const wordDisplay = document.getElementById("word-display");
        const scoreDisplay = document.getElementById("score");
        const feedbackBox = document.getElementById("feedback-box");
        const nextBtn = document.getElementById("next-btn");
        const restartBtn = document.getElementById("restart-btn");
        const actionButtons = document.getElementById("action-buttons");
        const totalRoundsDisplay = document.getElementById("total-rounds");

        totalRoundsDisplay.innerText = dataset.length;

        function loadQuestion() {
            feedbackBox.classList.add("hidden");
            nextBtn.classList.add("hidden");
            actionButtons.classList.remove("hidden");
            
            const currentItem = dataset[currentIndex];
            gamePicture.src = currentItem.imgUrl;
            wordDisplay.innerText = currentItem.display;
        }

        function checkAnswer(selectedType) {
            const currentItem = dataset[currentIndex];
            feedbackBox.classList.remove("hidden");
            actionButtons.classList.add("hidden");

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (selectedType === currentItem.type) {
                score++;
                scoreDisplay.innerText = score;
                feedbackBox.innerHTML = `<span class="emoji-anim">🙌👏</span><span>Muito bem, você arrasou! A palavra é ${currentItem.word}.</span>`;
                feedbackBox.className = "feedback success";
                
                playTone(audioCtx, 523.25, "sine", 0.1); 
                setTimeout(() => playTone(audioCtx, 659.25, "sine", 0.1), 100); 
                setTimeout(() => playTone(audioCtx, 783.99, "sine", 0.3), 200); 
            } else {
                feedbackBox.innerHTML = `<span class="emoji-anim">😢😢</span><span>ops, não foi dessa vez, pense mais um pouco!</span>`;
                feedbackBox.className = "feedback error";
                
                playTone(audioCtx, 293.66, "triangle", 0.2); 
                setTimeout(() => playTone(audioCtx, 220.00, "triangle", 0.4), 200); 
            }

            if (currentIndex < dataset.length - 1) {
                nextBtn.classList.remove("hidden");
            } else {
                restartBtn.classList.remove("hidden");
                feedbackBox.innerHTML += `<br><br>🏆 <strong>Missão Cumprida!</strong> Você resolveu ${score} de ${dataset.length} enigmas!`;
            }
        }

        function playTone(ctx, freq, type, duration) {
            try {
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            restartBtn.classList.add("hidden");
            dataset.sort(() => Math.random() - 0.5); 
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
